name: vexra
description: VEXRA - AI Scheduling Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # AI
  google_generative_ai: ^0.4.3
  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  # Storage
  shared_preferences: ^2.2.3
  # Network check
  connectivity_plus: ^6.0.3
  # Utils
  intl: ^0.19.0
  permission_handler: ^11.3.0
  path: ^1.8.3

  # Supabase Sync
  supabase_flutter: ^2.6.0
  # Background Service (Force keep alive)
  flutter_background_service: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  adaptive_icon_foreground: "icon.png"
  adaptive_icon_background: "#0B0F14"

flutter_native_splash:
  color: "#0B0F14"
  image: "logo.png"

flutter:
  uses-material-design: true
  assets:
    - logo.png
